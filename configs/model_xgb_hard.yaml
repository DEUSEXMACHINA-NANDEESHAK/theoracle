# ===== TheOracle: XGBoost Hard Court Model Configuration =====

model_name: "xgb_hard"
surface: "Hard"

hyperparameters:
  n_estimators: 600
  max_depth: 6
  learning_rate: 0.045
  subsample: 0.80
  colsample_bytree: 0.78
  reg_lambda: 1.0
  reg_alpha: 0.1
  min_child_weight: 3
  gamma: 0.08
  scale_pos_weight: 1.0
  eval_metric: "logloss"
  early_stopping_rounds: 50
  tree_method: "auto"
  verbosity: 1

# Hard court notes:
# - Most data available → can afford deeper trees
# - Balanced surface (serve + rally both matter)
# - Wide variety of court speeds (slow Melbourne → fast Shanghai)
# - Court speed index feature especially valuable here
# - Indoor/outdoor distinction matters
